<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Editar Tarefas</title>
</head>
<body>

<h2>Editar Tarefas</h2>
<input id="tarefa" placeholder="Nova tarefa">
<button onclick="adicionar()">Adicionar</button>

<ul id="lista"></ul>

<script>
let tarefas=[]

function adicionar(){
  const texto = document.getElementById("tarefa").value
  if(texto){
    tarefas.push(texto)
    render()
  }
  document.getElementById("tarefa").value=""
}

function editar(i){
  const novo = prompt("Editar tarefa:", tarefas[i])
  if(novo){
    tarefas.splice(i,1,novo)
    render()
  }
}

function render(){
  const ul = document.getElementById("lista")
  ul.innerHTML=""
  tarefas.forEach((t,i)=>{
    ul.innerHTML += `<li>${t} <button onclick="editar(${i})">Editar</button></li>`
  })
}
</script>

</body>
</html>
