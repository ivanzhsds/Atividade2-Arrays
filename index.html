<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body><input id="nome" placeholder="Nome do aluno">
<input id="nota" placeholder="Nota">
<button onclick="adicionar()">Adicionar</button>
<button onclick="aprovados()">Mostrar aprovados</button>

<ul id="lista"></ul>

<script>

let alunos = []

function adicionar(){
  const nome = document.getElementById("nome").value
  const nota = Number(document.getElementById("nota").value)

  alunos.push({nome:nome, nota:nota})

  render(alunos)
}

function aprovados(){

  const filtrados = alunos.filter(a => a.nota >= 7)

  render(filtrados)
}

function render(lista){

  const ul = document.getElementById("lista")
  ul.innerHTML = ""

  lista.forEach(a=>{
    ul.innerHTML += `<li>${a.nome} - Nota: ${a.nota}</li>`
  })
}

</script>
</body>
</html>
